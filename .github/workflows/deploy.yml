name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Listar arquivos modificados após checkout (debug)
        run: find . -type f -printf '%T@ %p\n' | sort -n | tail -20
      - name: Listar conteúdo de next.config.js (debug)
        run: |
          if [ -f next.config.js ]; then
            echo "Arquivo next.config.js existe. Conteúdo:" && cat next.config.js
          else
            echo "Arquivo next.config.js não existe."
          fi
      - name: Remover next.config.js se existir
        run: rm -f next.config.js
      - name: Confirmar remoção de next.config.js (debug)
        run: |
          if [ -f next.config.js ]; then
            echo "Falha ao remover next.config.js!" && cat next.config.js
          else
            echo "next.config.js removido com sucesso."
          fi
      - name: Remover next.config.js antes do build (forçado)
        run: rm -f next.config.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next
      - name: Install dependencies
        run: npm install
      - name: Clean npm cache (opcional)
        run: npm cache clean --force
      - name: Build static site with Next.js
        run: npm run build
      - name: Listar conteúdo de next.config.js após build (debug)
        run: |
          if [ -f next.config.js ]; then
            echo "Arquivo next.config.js foi recriado durante o build. Conteúdo:" && cat next.config.js
          else
            echo "Arquivo next.config.js não existe após o build."
          fi
      - name: List files after build (debug)
        run: |
          echo "Diretório atual: $(pwd)"
          ls -l
          echo "Conteúdo da pasta ./out:"
          ls -l ./out || echo "./out não existe"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4